<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Pig</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Game of <em>Pig</em></h1>
        <button id="quit" class="hidden">Quit</button>
    </header>

    <main>

        <!-- Setup screen shown before game starts -->
        <section id="setup">
            <h2>New Game</h2>

            <div class="setup-grid">
                <div class="input-group">
                    <label for="name1">Player 1</label>
                    <input type="text" id="name1" placeholder="Enter name" maxlength="20">
                </div>

                <label class="toggle-label">
                    <input type="checkbox" id="vscomputer">
                    <span>vs Computer</span>
                </label>

                <div class="input-group">
                    <label for="name2">Player 2</label>
                    <input type="text" id="name2" placeholder="Enter name" maxlength="20">
                </div>
            </div>

            <div class="threshold-group">
                <label for="threshold">First to <strong id="threshold-display">30</strong> points wins</label>
                <input type="range" id="threshold" min="10" max="100" value="30">
            </div>

            <button id="startgame">Start Game</button>
        </section>

        <!-- Game board-->
        <section id="gameboard" class="hidden">

            <aside id="player1panel" class="player-panel">
                <h2 id="p1name">Player 1</h2>
                <p class="total-score"><span>0</span></p>
                <p class="score-label">pts</p>
            </aside>

            <section id="game">
                <div class="dice-area">
                    <img src="images/1die.svg" width="100" height="100" alt="Die showing 1" id="die1">
                    <img src="images/1die.svg" width="100" height="100" alt="Die showing 1" id="die2">
                </div>
                <p id="game-message">Roll to begin</p>
            </section>

            <aside id="player2panel" class="player-panel">
                <h2 id="p2name">Player 2</h2>
                <p class="total-score"><span>0</span></p>
                <p class="score-label">pts</p>
            </aside>

        </section>

        <!-- Action buttons-->
        <section id="actions" class="hidden">
            <button id="roll" disabled>Roll</button>
            <button id="pass" disabled>Pass</button>
        </section>

        <!-- Win message / score feedback -->
        <section id="score"></section>

    </main>

    <footer>
        <p>Game of Pig &mdash; DES 157A</p>
    </footer>

</body>
</html>
